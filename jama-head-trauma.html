        * { margin: 0; padding: 0; box-sizing: border-box; }

            font-family: 'Crimson Pro', serif;
            font-size: 18px;
            color: var(--txt);
            font-weight: 600;
        }
        .tip {
            background: linear-gradient(135deg, #FFF8E1, #FFECB3);
            border-left: 4px solid var(--warn);
            border-radius: 0 14px 14px 0;
            padding: 16px;
            margin: 14px 0;
        }
        .good {
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
            border-left: 4px solid var(--suc);
            border-radius: 0 14px 14px 0;

            margin: 14px 0;
        }
        .danger {

            padding: 16px;

            background: linear-gradient(135deg, #EDE7F6, #D1C4E9);

<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const lessons = [
    { id: 1, title: '頭部創傷概論與分級', sub: 'Head Trauma Classification', color: '#1E88E5' },
    { id: 2, title: '臨床病史評估', sub: 'Clinical History Features', color: '#00897B' },
    { id: 3, title: '理學檢查發現', sub: 'Physical Examination Signs', color: '#5E35B1' },
    { id: 4, title: '臨床決策規則', sub: 'Clinical Decision Rules', color: '#E53935' },
    { id: 5, title: '臨床應用整合', sub: 'Clinical Application', color: '#F57C00' }
];

const quiz = [
    {
        q: '根據JAMA系統性回顧，輕微頭部創傷患者中嚴重顱內損傷的盛行率約為多少？',
        o: ['1-2%', '7.1%', '15-20%', '30%'],
        c: 1,
        e: '在23,079名輕微頭部創傷患者中，嚴重顱內損傷的盛行率為7.1% (95% CI, 6.8%-7.4%)。需要神經外科手術或導致死亡的損傷約0.9%。'
    },
    {
        q: '下列哪個理學檢查發現對於預測嚴重顱內損傷具有最高的陽性似然比(LR+)？',
        o: ['頭痛', '意識喪失', '疑似顱骨骨折徵象', '嘔吐一次'],
        c: 2,
        e: '疑似顱骨骨折徵象 (包括Battle sign、浣熊眼、腦脊髓液漏) 的LR+ = 16 (95% CI, 3.1-59)，是最強的預測指標。'
    },
    {
        q: 'GCS分數為13分時，對於嚴重顱內損傷的診斷意義為何？',
        o: ['可排除嚴重損傷', 'LR+ = 4.9，顯著增加損傷可能性', '與GCS 15分風險相同', '需要立即手術'],
        c: 1,
        e: 'GCS分數13分的LR+ = 4.9 (95% CI, 2.8-8.5)，以7.1%的基線盛行率計算，顱內損傷的機率提升至18%-39%。'
    },
    {
        q: '關於Canadian CT Head Rule，下列何者正確？',
        o: ['包含頭痛作為風險因子', '陰性結果的LR- = 0.04', '適用於GCS < 13的患者', '不考慮年齡因素'],
        c: 1,
        e: 'Canadian CT Head Rule陰性結果的LR- = 0.04 (95% CI, 0-0.65)，可將嚴重顱內損傷機率降至0.31%。規則包含年齡≥65歲作為風險因子。'
    },
    {
        q: '下列哪個症狀對於預測嚴重顱內損傷最有價值？',
        o: ['單次嘔吐', '頭痛', '嘔吐≥2次', '頭暈'],
        c: 2,
        e: '嘔吐≥2次的LR+ = 3.6 (95% CI, 3.1-4.1)，而單次嘔吐的LR+僅2.3。重複嘔吐是更可靠的警示徵象。'
    },
    {
        q: '關於意識喪失對顱內損傷的預測價值，何者正確？',
        o: ['無意識喪失可完全排除損傷', 'LR+ = 1.6，診斷價值有限', '意識喪失是最重要的預測因子', '只有意識喪失>30分鐘才有意義'],
        c: 1,
        e: '意識喪失的LR+ = 1.6 (95% CI, 1.1-2.1)，無意識喪失的LR- = 0.60，單獨此症狀不足以排除或確認顱內損傷。'
    },
    {
        q: 'New Orleans Criteria包含下列哪些項目？',
        o: ['年齡≥65歲、危險機轉、頭痛', '年齡>60歲、醉酒、頭痛、嘔吐、癲癇、失憶、鎖骨以上創傷', 'GCS < 15於2小時、疑似顱骨骨折', '年齡、性別、血壓'],
        c: 1,
        e: 'New Orleans Criteria包含：年齡>60歲、醉酒、頭痛、任何嘔吐、癲癇、失憶、鎖骨以上可見創傷。陰性結果LR- = 0.08。'
    },
    {
        q: '行人被車輛撞擊後的顱內損傷風險為何？',
        o: ['與其他機轉相同', 'LR+ = 3.0-4.3，顯著增加風險', '僅需觀察無需CT', 'LR- < 0.1，可排除損傷'],
        c: 1,
        e: '行人被車輛撞擊的LR+ = 3.0-4.3，以7.1%基線盛行率計算，顱內損傷預測值為19%-25%，是重要的危險機轉。'
    },
    {
        q: '下列何者是顱底骨折的典型臨床徵象？',
        o: ['前額血腫', 'Battle sign (乳突區瘀斑)、浣熊眼、腦脊髓液耳漏', '瞳孔對光反射正常', '頸部僵硬'],
        c: 1,
        e: '顱底骨折徵象包括：Battle sign (耳後瘀斑)、浣熊眼 (眶周瘀斑)、腦脊髓液耳漏/鼻漏、鼓膜積血。LR+ = 6.0。'
    },
    {
        q: '當患者完全不符合Canadian CT Head Rule任何條件時，嚴重顱內損傷的機率約為多少？',
        o: ['5%', '2-3%', '0.31%', '與基線相同(7.1%)'],
        c: 2,
        e: '當Canadian CT Head Rule完全陰性時，LR- = 0.04，將7.1%的基線盛行率降低至0.31% (95% CI, 0%-4.7%)，可安全出院。'
    }
];

const App = () => {
    const [page, setPage] = useState('home');
    const [lessonId, setLessonId] = useState(1);
    const [qIdx, setQIdx] = useState(0);
    const [score, setScore] = useState(0);
    const [sel, setSel] = useState(null);
    const [show, setShow] = useState(false);
    const [done, setDone] = useState(false);

    const Header = ({ title }) => (
        <header style={{ 
            background: '#fff', 
            borderBottom: '1px solid rgba(30, 136, 229, 0.1)', 
            padding: '14px 16px', 
            position: 'sticky', 
            top: 0, 
            zIndex: 10,
            backdropFilter: 'blur(10px)'
        }}>
            <div style={{ maxWidth: 480, margin: '0 auto', display: 'flex', alignItems: 'center', gap: 12 }}>
                <button 
                    onClick={() => page === 'home' ? window.location.href = 'jama-rational-exam.html' : setPage('home')} 
                    style={{ 
                        background: 'linear-gradient(135deg, #E3F2FD, #BBDEFB)', 
                        border: 'none', 
                        borderRadius: 12,

                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>

    const Home = () => (
        <div className="fade-in">
            <Header title="輕微頭部創傷評估" />
            <div style={{ 
                background: 'linear-gradient(135deg, #1E88E5 0%, #42A5F5 50%, #00897B 100%)', 
                padding: '36px 20px 44px', 
                color: '#fff',
                position: 'relative',
                overflow: 'hidden'
            }}>
                <div style={{
                    position: 'absolute',
                    top: -30,
                    right: -30,

                    height: 150,

                }} />
                <div style={{ maxWidth: 480, margin: '0 auto', position: 'relative', zIndex: 1 }}>
                    <div style={{ 
                        background: 'rgba(255,255,255,0.2)',

                        padding: '8px 16px',

                    </p>
                    <p style={{ opacity: 0.8, fontSize: 12, marginTop: 8 }}>
                        Easter JS, et al. JAMA. 2015;314(24):2672-2681
                    </p>
                    <a 
                        href="https://jamanetwork.com/journals/jama/fullarticle/2478532" 
                        target="_blank" 
                        rel="noopener noreferrer"
                        style={{
                            display:'inline-flex',
                            alignItems:'center',
                            gap:6,
                            background:'rgba(255,255,255,0.25)',
                            color:'#fff',
                            padding:'8px 16px',
                            borderRadius:25,
                            fontSize:13,
                            fontWeight:600,
                            textDecoration:'none',
                            backdropFilter:'blur(10px)',
                            marginTop: 12,
                            transition:'all 0.3s'
                        }}
                    >
                        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                        閱讀原文 Read Full Article
                    </a>

            </div>
            
            <div style={{ padding: '0 16px', marginTop: -24 }}>

                    <div className="card">

                            <span style={{ fontSize: 22 }}>🎯</span> 學習目標

                            '識別預測嚴重顱內損傷的臨床特徵',
                            '熟悉Canadian CT Head Rule與New Orleans Criteria',
                            '掌握低風險患者的安全出院標準'
                        ].map((t, i) => (
                            <div key={i} style={{ display: 'flex', gap: 12, marginBottom: 10, fontSize: 14 }}>

                                    borderRadius: 8, 
                                    width: 26,

                                }}>{i + 1}</span>

                    </div>

                    <div className="danger" style={{ marginBottom: 20 }}>

                        style={{

                            gap: 8,
                            padding: '14px 20px',

                        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">

    // Lesson 1: 頭部創傷概論與分級
    const L1 = () => (
        <div className="fade-in">
            <div className="card">
                <h3 style={{ fontSize: 18, fontWeight: 700, color: 'var(--pri)', marginBottom: 14 }}>🧠 頭部創傷的定義與分類</h3>
                <div className="formula">
                    Glasgow Coma Scale (GCS) 評分是頭部創傷分類的基礎
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>嚴重度</th>
                            <th>GCS分數</th>
                            <th>處置建議</th>

            <div className="card">

                <table>

                            <td style={{ fontWeight: 600 }}>CT減少率</td>
                            <td>較高</td>
                            <td>較低</td>
                        </tr>
                    </tbody>
                </table>
                <div className="tip">
                    <strong>💡 選擇建議</strong>
                    <p style={{ fontSize: 14, color: 'var(--txt2)', marginTop: 6 }}>
                        Canadian CT Head Rule具有較高特異度，可減少不必要的CT檢查。
                        在大多數比較研究中，其識別顱內損傷的準確度優於New Orleans Criteria。
                    </p>
                </div>
            </div>

            <div className="card">
                <h3 style={{ fontSize: 18, fontWeight: 700, color: 'var(--warn)', marginBottom: 14 }}>⚠️ 規則使用注意事項</h3>
                <div className="danger">
                    <strong>規則限制</strong>
                    <ul style={{ marginTop: 8, marginLeft: 16, color: 'var(--txt2)', fontSize: 14 }}>
                        <li>不適用於嚴重凝血功能障礙患者</li>
                        <li>不適用於嚴重醉酒者</li>
                        <li>不適用於年齡>75歲的族群 (驗證不足)</li>
                        <li>不適用於受傷>24小時後就診者</li>
                    </ul>
                </div>
                <div className="info" style={{ marginTop: 14 }}>
                    <strong>正確解讀</strong>
                    <p style={{ fontSize: 14, color: 'var(--txt2)', marginTop: 6 }}>
                        這些規則是用來識別<strong>低風險</strong>患者可安全出院，而非規定有一項陽性就必須做CT。
                        有一項或多項陽性時，仍需結合臨床判斷、患者偏好、陽性項目數量和具體特徵做決策。
                    </p>
                </div>
            </div>
        </div>
    );

    // Lesson 5: 臨床應用整合
    const L5 = () => (
        <div className="fade-in">
            <div className="card">
                <h3 style={{ fontSize: 18, fontWeight: 700, color: 'var(--pri)', marginBottom: 14 }}>🏥 Case 1：67歲女性跌倒</h3>
                <div className="info">
                    <strong>病史</strong>
                    <p style={{ fontSize: 14, color: 'var(--txt2)', marginTop: 6 }}>
                        67歲女性在冰上滑倒撞到頭部。無意識喪失，完整記得事件經過。
                        跌倒後立即嘔吐一次，3小時後到急診再嘔吐一次。
                        前額有0.5cm擦傷，GCS 15分，神經學檢查正常。
                    </p>
                </div>
                <div style={{ marginTop: 14 }}>
                    <h4 style={{ color: 'var(--sec)', marginBottom: 10 }}>📋 風險評估</h4>
                    <table>
                        <tbody>
                            <tr>
                                <td style={{ fontWeight: 600 }}>年齡 ≥65歲</td>
                                <td><span className="lr-badge lr-high">✓ 陽性</span></td>
                            </tr>
                            <tr>
                                <td style={{ fontWeight: 600 }}>嘔吐 ≥2次</td>
                                <td><span className="lr-badge lr-high">✓ 陽性</span></td>
                            </tr>
                            <tr>
                                <td style={{ fontWeight: 600 }}>Canadian Rule狀態</td>
                                <td><span className="lr-badge lr-high">高風險</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div className="danger" style={{ marginTop: 14 }}>
                    <strong>後測機率計算</strong>
                    <p style={{ fontSize: 14, color: 'var(--txt2)', marginTop: 6 }}>
                        以6.8%基線盛行率，嘔吐≥2次 (LR+ = 3.6) →<br/>
                        後測機率 = <strong>21%</strong> 顱內損傷
                    </p>
                </div>
                <div className="good" style={{ marginTop: 14 }}>
                    <strong>✓ 結果</strong>
                    <p style={{ fontSize: 14, color: 'var(--txt2)', marginTop: 6 }}>
                        頭部CT顯示硬腦膜下血腫。住院觀察48小時後，症狀改善，神經學檢查正常，
                        出院並安排2週後神經外科門診追蹤。
                    </p>
                </div>
            </div>

            <div className="card">
                <h3 style={{ fontSize: 18, fontWeight: 700, color: 'var(--sec)', marginBottom: 14 }}>🏀 Case 2：20歲男性運動傷害</h3>
                <div className="info">
                    <strong>病史</strong>
                    <p style={{ fontSize: 14, color: 'var(--txt2)', marginTop: 6 }}>
                        20歲男性打籃球被撞倒，意識喪失約5秒後恢復並繼續比賽。
                        受傷4小時後到急診，左側中度頭痛，左頂部頭皮血腫。
                        無其他異常發現，GCS 15分。
                    </p>
                </div>
                <div style={{ marginTop: 14 }}>
                    <h4 style={{ color: 'var(--sec)', marginBottom: 10 }}>📋 Canadian CT Head Rule評估</h4>
                    <table>
                        <tbody>
                            <tr>
                                <td>年齡 ≥65歲</td>
                                <td><span className="lr-badge lr-low">✗ 陰性</span></td>
                            </tr>
                            <tr>
                                <td>危險機轉</td>
                                <td><span className="lr-badge lr-low">✗ 陰性</span></td>
                            </tr>
                            <tr>
                                <td>嘔吐 >1次</td>
                                <td><span className="lr-badge lr-low">✗ 陰性</span></td>
                            </tr>
                            <tr>
                                <td>失憶 >30分鐘</td>
                                <td><span className="lr-badge lr-low">✗ 陰性</span></td>
                            </tr>
                            <tr>
                                <td>2小時後GCS &lt;15</td>
                                <td><span className="lr-badge lr-low">✗ 陰性</span></td>
                            </tr>
                            <tr>
                                <td>疑似顱骨骨折</td>
                                <td><span className="lr-badge lr-low">✗ 陰性</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div className="good" style={{ marginTop: 14 }}>
                    <strong>後測機率計算</strong>
                    <p style={{ fontSize: 14, color: 'var(--txt2)', marginTop: 6 }}>
                        以7.4%基線盛行率，Canadian Rule完全陰性 (LR- = 0.04) →<br/>
                        後測機率 = <strong>0.32%</strong> 顱內損傷
                    </p>
                </div>
                <div className="tip" style={{ marginTop: 14 }}>
                    <strong>💡 處置</strong>
                    <p style={{ fontSize: 14, color: 'var(--txt2)', marginTop: 6 }}>
                        儘管有意識喪失和頭痛 (New Orleans Criteria項目)，但不符合Canadian Rule任何條件。
                        結合臨床判斷，給予嚴格衛教後出院，1週後追蹤完全恢復。
                    </p>
                </div>
            </div>

            <div className="card">
                <h3 style={{ fontSize: 18, fontWeight: 700, color: 'var(--danger)', marginBottom: 14 }}>🚨 出院衛教要點</h3>
                <p style={{ fontSize: 14, color: 'var(--txt2)', marginBottom: 12 }}>
                    所有出院患者應有成人陪伴，並告知以下警示症狀需立即回診：
                </p>
                <div style={{ display: 'grid', gap: 10 }}>
                    {[
                        { icon: '🤮', text: '多次嘔吐' },
                        { icon: '🤕', text: '劇烈或惡化的頭痛' },
                        { icon: '⚡', text: '癲癇發作' },
                        { icon: '😵', text: '意識狀態惡化' },
                        { icon: '💪', text: '肢體無力或感覺異常' },
                        { icon: '👁️', text: '視力改變' }
                    ].map((x, i) => (
                        <div key={i} style={{ 
                            background: 'linear-gradient(135deg, #FFEBEE, #FFCDD2)',
                            padding: '12px 16px', 
                            borderRadius: 12,
                            display: 'flex',
                            alignItems: 'center',
                            gap: 12,
                            fontSize: 14
                        }}>
                            <span style={{ fontSize: 20 }}>{x.icon}</span>
                            <span style={{ color: 'var(--danger)' }}>{x.text}</span>
                        </div>
                    ))}
                </div>
            </div>

            <div className="card">
                <h3 style={{ fontSize: 18, fontWeight: 700, color: 'var(--info)', marginBottom: 14 }}>📊 臨床決策流程</h3>
                <div style={{ 
                    background: 'linear-gradient(135deg, #E3F2FD, #BBDEFB)', 
                    padding: 20, 
                    borderRadius: 16,
                    textAlign: 'center'
                }}>
                    <div style={{ marginBottom: 16 }}>
                        <div style={{ 
                            background: 'var(--pri)', 
                            color: '#fff', 
                            padding: '10px 20px', 
                            borderRadius: 10,
                            display: 'inline-block',
                            fontWeight: 600
                        }}>
                            成人輕微頭部創傷 (GCS 13-15)
                        </div>
                    </div>
                    <div style={{ fontSize: 24, marginBottom: 16 }}>↓</div>
                    <div style={{ marginBottom: 16 }}>
                        <div style={{ 
                            background: 'var(--danger)', 
                            color: '#fff', 
                            padding: '10px 20px', 
                            borderRadius: 10,
                            display: 'inline-block',
                            fontWeight: 600
                        }}>
                            GCS ≤13 或 意識改變?
                        </div>
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'center', gap: 40 }}>
                        <div>
                            <div style={{ fontSize: 14, color: 'var(--danger)', fontWeight: 600 }}>是</div>
                            <div style={{ fontSize: 20 }}>↓</div>
                            <div style={{ 
                                background: 'var(--danger)', 
                                color: '#fff', 
                                padding: '8px 16px', 
                                borderRadius: 8,
                                fontSize: 13
                            }}>
                                立即CT + 會診
                            </div>
                        </div>
                        <div>
                            <div style={{ fontSize: 14, color: 'var(--suc)', fontWeight: 600 }}>否</div>
                            <div style={{ fontSize: 20 }}>↓</div>
                            <div style={{ 
                                background: 'var(--sec)', 
                                color: '#fff', 
                                padding: '8px 16px', 
                                borderRadius: 8,
                                fontSize: 13
                            }}>
                                應用臨床決策規則
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div className="card">
                <h3 style={{ fontSize: 18, fontWeight: 700, color: 'var(--suc)', marginBottom: 14 }}>✅ 核心重點總結</h3>
                <div style={{ display: 'grid', gap: 12 }}>
                    {[
                        '輕微頭部創傷嚴重顱內損傷盛行率7.1%',
                        '疑似顱骨骨折徵象LR+ = 16，是最強預測指標',
                        '嘔吐≥2次、GCS 13、GCS下降都是高風險特徵',
                        '意識喪失單獨不足以排除或確認損傷',
                        'Canadian Rule陰性可將損傷機率降至0.31%',
                        '規則是輔助工具，不能取代臨床判斷'
                    ].map((item, i) => (
                        <div key={i} style={{ 
                            background: 'linear-gradient(135deg, #E8F5E9, #C8E6C9)',
                            padding: '12px 16px', 
                            borderRadius: 12,
                            display: 'flex',
                            alignItems: 'center',
                            gap: 12
                        }}>
                            <span style={{ 
                                background: 'var(--suc)',
                                color: '#fff',
                                borderRadius: '50%',
                                width: 24,
                                height: 24,
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                fontSize: 12,
                                fontWeight: 700,
                                flexShrink: 0
                            }}>✓</span>
                            <span style={{ fontSize: 14, color: 'var(--txt)' }}>{item}</span>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );

    const Lesson = () => {
        const l = lessons.find(x => x.id === lessonId);
        return (
            <div className="fade-in">
                <Header title={l.title} />
                <div style={{ background: `linear-gradient(135deg, ${l.color}, ${l.color}88)`, padding: '20px', color: '#fff' }}>
                    <div style={{ maxWidth: 480, margin: '0 auto' }}>
                        <div style={{ fontSize: 12, opacity: 0.9 }}>Lesson {l.id} • {l.sub}</div>
                        <h1 style={{ fontSize: 24, fontWeight: 700 }}>{l.title}</h1>
                    </div>
                </div>
                <div style={{ padding: '20px 16px' }}>
                    <div style={{ maxWidth: 480, margin: '0 auto' }}>
                        {lessonId === 1 && <L1 />}
                        {lessonId === 2 && <L2 />}
                        {lessonId === 3 && <L3 />}
                        {lessonId === 4 && <L4 />}
                        {lessonId === 5 && <L5 />}
                        <div style={{ display: 'flex', gap: 12, marginTop: 24 }}>
                            {lessonId > 1 && (
                                <button className="btn" style={{ flex: 1, background: '#fff', border: '2px solid var(--pri)', color: 'var(--pri)' }} onClick={() => setLessonId(lessonId - 1)}>
                                    ← 上一課
                                </button>
                            )}
                            {lessonId < 5 ? (
                                <button className="btn btn-pri" style={{ flex: 1 }} onClick={() => setLessonId(lessonId + 1)}>
                                    下一課 →
                                </button>
                            ) : (
                                <button className="btn btn-sec" style={{ flex: 1 }} onClick={() => { setQIdx(0); setScore(0); setSel(null); setShow(false); setDone(false); setPage('quiz'); }}>
                                    開始測驗 📝
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const Quiz = () => {
        const pick = (i) => { if (show) return; setSel(i); setShow(true); if (i === quiz[qIdx].c) setScore(score + 1); };
        const next = () => { if (qIdx < quiz.length - 1) { setQIdx(qIdx + 1); setSel(null); setShow(false); } else setDone(true); };

        if (done) {
            const pct = Math.round((score / quiz.length) * 100);
            return (
                <div className="fade-in">
                    <Header title="測驗結果" />
                    <div style={{ padding: '48px 16px', textAlign: 'center' }}>
                        <div style={{ 
                            width: 150, 
                            height: 150, 
                            borderRadius: '50%', 
                            background: `conic-gradient(${pct >= 80 ? 'var(--suc)' : pct >= 60 ? 'var(--warn)' : 'var(--danger)'} ${pct * 3.6}deg, #E5E5E5 0deg)`, 
                            display: 'flex', 
                            alignItems: 'center', 
                            justifyContent: 'center', 
                            margin: '0 auto 28px',
                            boxShadow: '0 8px 32px rgba(0,0,0,0.1)'
                        }}>
                            <div style={{ 
                                width: 126, 
                                height: 126, 
                                borderRadius: '50%', 
                                background: '#fff', 
                                display: 'flex', 
                                flexDirection: 'column', 
                                alignItems: 'center', 
                                justifyContent: 'center' 
                            }}>
                                <div style={{ fontSize: 40, fontWeight: 700, color: 'var(--txt)' }}>{pct}%</div>
                                <div style={{ fontSize: 15, color: 'var(--txt2)' }}>{score}/{quiz.length}</div>
                            </div>
                        </div>
                        <h2 style={{ fontSize: 26, fontWeight: 700, marginBottom: 10 }}>
                            {pct >= 80 ? '🎉 優秀！' : pct >= 60 ? '👍 不錯！' : '💪 加油！'}
                        </h2>
                        <p style={{ color: 'var(--txt2)', marginBottom: 36, fontSize: 15 }}>
                            {pct >= 80 ? '你對輕微頭部創傷評估掌握良好！' : pct >= 60 ? '再複習可以更進步！' : '建議重新閱讀課程內容'}
                        </p>
                        <div style={{ display: 'flex', gap: 14, justifyContent: 'center', flexWrap: 'wrap' }}>
                            <button className="btn btn-pri" onClick={() => { setQIdx(0); setScore(0); setSel(null); setShow(false); setDone(false); }}>
                                重新測驗
                            </button>
                            <button className="btn" style={{ background: '#fff', border: '2px solid var(--pri)', color: 'var(--pri)' }} onClick={() => setPage('home')}>
                                返回課程
                            </button>
                        </div>
                    </div>
                    <footer style={{ background: 'linear-gradient(135deg, #E3F2FD, #BBDEFB)', padding: '28px 16px', textAlign: 'center', marginTop: 48 }}>
                        <p style={{ fontSize: 12, color: 'var(--txt2)' }}>新竹台大分院教學部 | 謝慕揚 MD, PhD, FESC | 黃沛銓 MD | 黃國良</p>
                    </footer>
                </div>
            );
        }

        const q = quiz[qIdx];
        return (
            <div className="fade-in">
                <Header title="自我測驗" />
                <div style={{ padding: '20px 16px' }}>
                    <div style={{ maxWidth: 480, margin: '0 auto' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10, fontSize: 14 }}>
                            <span style={{ color: 'var(--txt2)' }}>進度</span>
                            <span style={{ fontWeight: 600, color: 'var(--pri)' }}>{qIdx + 1}/{quiz.length}</span>
                        </div>
                        <div style={{ height: 10, background: '#E5E5E5', borderRadius: 5, marginBottom: 24, overflow: 'hidden' }}>
                            <div style={{ 
                                height: '100%', 
                                width: `${((qIdx + 1) / quiz.length) * 100}%`, 
                                background: 'linear-gradient(90deg, var(--pri), var(--pri2))', 
                                borderRadius: 5, 
                                transition: 'width 0.4s ease' 
                            }} />
                        </div>
                        <div className="card">
                            <h3 style={{ fontSize: 16, fontWeight: 600, lineHeight: 1.7, marginBottom: 22, color: 'var(--txt)' }}>{q.q}</h3>
                            {q.o.map((opt, i) => {
                                let bg = '#fff', bd = '#E5E5E5';
                                if (show) {
                                    if (i === q.c) { bg = '#E8F5E9'; bd = 'var(--suc)'; }
                                    else if (i === sel) { bg = '#FFEBEE'; bd = 'var(--danger)'; }
                                } else if (i === sel) { bg = '#E3F2FD'; bd = 'var(--pri)'; }
                                return (
                                    <button 
                                        key={i} 
                                        onClick={() => pick(i)} 
                                        disabled={show} 
                                        style={{ 
                                            width: '100%', 
                                            padding: '14px 16px', 
                                            marginBottom: 12, 
                                            background: bg, 
                                            border: `2px solid ${bd}`, 
                                            borderRadius: 14, 
                                            textAlign: 'left', 
                                            fontSize: 14, 
                                            cursor: show ? 'default' : 'pointer', 
                                            display: 'flex', 
                                            alignItems: 'center', 
                                            gap: 14,
                                            transition: 'all 0.2s ease'
                                        }}
                                    >
                                        <span style={{ 
                                            width: 30, 
                                            height: 30, 
                                            borderRadius: 10, 
                                            background: show && i === q.c ? 'var(--suc)' : show && i === sel ? 'var(--danger)' : 'linear-gradient(135deg, #E3F2FD, #BBDEFB)', 
                                            color: show && (i === q.c || i === sel) ? '#fff' : 'var(--pri)', 
                                            display: 'flex', 
                                            alignItems: 'center', 
                                            justifyContent: 'center', 
                                            fontWeight: 700, 
                                            fontSize: 14, 
                                            flexShrink: 0 
                                        }}>
                                            {show && i === q.c ? '✓' : show && i === sel && i !== q.c ? '✗' : String.fromCharCode(65 + i)}
                                        </span>
                                        <span style={{ lineHeight: 1.6, color: 'var(--txt)' }}>{opt}</span>
                                    </button>
                                );
                            })}
                        </div>
                        {show && (
                            <div className={sel === q.c ? 'good' : 'tip'}>
                                <strong style={{ color: sel === q.c ? 'var(--suc)' : '#F57C00' }}>
                                    {sel === q.c ? '✓ 正確！' : '✗ 答錯了'}
                                </strong>
                                <p style={{ fontSize: 14, color: 'var(--txt2)', marginTop: 10, lineHeight: 1.8 }}>{q.e}</p>
                            </div>
                        )}
                        {show && (
                            <button className="btn btn-pri" style={{ width: '100%', justifyContent: 'center', marginTop: 20 }} onClick={next}>
                                {qIdx < quiz.length - 1 ? '下一題 →' : '查看結果'}
                            </button>
                        )}
                    </div>
                </div>
            </div>
        );
    };

    return (
        <div style={{ maxWidth: '100%', minHeight: '100vh', background: 'var(--bg)' }}>
            {page === 'home' ? <Home /> : page === 'lesson' ? <Lesson /> : <Quiz />}
        </div>
    );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
